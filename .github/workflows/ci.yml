name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --diff fake_job_detector/

      - name: Check import order (isort)
        run: isort --check-only --diff fake_job_detector/

      - name: Lint (flake8)
        run: |
          flake8 fake_job_detector/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  dashboard-build:
    name: Next.js Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fake_job_detector/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fake_job_detector/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
